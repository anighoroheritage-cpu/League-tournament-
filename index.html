<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Godstime Tournament</title>
<style>
body { font-family: Arial; background: #0d1117; color: white; margin:0; padding:20px; text-align:center; }
.container { max-width: 500px; margin: auto; background:#161b22; padding:20px; border-radius:10px; }
h1 { color: #58a6ff; }
input, select { width: 100%; padding:10px; margin:8px 0; border-radius:5px; border:none; }
button { padding:10px 15px; margin:5px; border:none; border-radius:5px; cursor:pointer; font-size:16px; }
button:hover { opacity:0.9; }
#registration, #admin { display:none; }
table { width:100%; border-collapse: collapse; margin-top:20px; }
th, td { padding:10px; border:1px solid #58a6ff; text-align:center; }
th { background:#238636; color:white; }
tr:nth-child(even) { background:#161b22; }
.clear-btn { background:#c9184a; color:white; }
.clear-btn:hover { background:#ff4d6d; }
.switch-btn { background:#238636; color:white; }
.switch-btn:hover { background:#2ea043; }
</style>
</head>
<body>

<h1>⚽ Godstime Tournament</h1>

<div>
    <button class="switch-btn" onclick="showSection('registration')">Registration Form</button>
    <button class="switch-btn" onclick="adminLogin()">Admin Dashboard</button>
</div>

<!-- Registration Section -->
<div class="container" id="registration">
    <form id="regForm">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email Address" required>
        <select id="country" required></select>
        <input type="text" id="phone" placeholder="Phone Number" required>
        <input type="text" id="team" placeholder="Team Name" required>
        <select id="game" required>
            <option value="eFootball" selected>eFootball</option>
        </select>
        <button type="submit">Register</button>
    </form>
</div>

<!-- Admin Section -->
<div class="container" id="admin">
    <table id="regTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Country</th>
                <th>Phone</th>
                <th>Team</th>
                <th>Game</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <button class="clear-btn" onclick="clearData()">Clear All Registrations</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

    const regSection = document.getElementById('registration');
    const adminSection = document.getElementById('admin');

    // Show section
    function showSection(id) {
        if(id === 'registration') {
            regSection.style.display = 'block';
            adminSection.style.display = 'none';
        } else if(id === 'admin') {
            regSection.style.display = 'none';
            adminSection.style.display = 'block';
            loadRegistrations();
        }
    }

    // Admin Login
    window.adminLogin = function() {
        let username = prompt("Enter Admin Username:");
        let password = prompt("Enter Admin Password:");
        if(username === "GT0021" && password === "Godstime@1") {
            showSection('admin');
        } else {
            alert("Incorrect username or password!");
        }
    }

    // Default show registration
    showSection('registration');

    // Countries
    const countries = [
        {name: "Nigeria", code: "+234"},
        {name: "United States", code: "+1"},
        {name: "United Kingdom", code: "+44"},
        {name: "India", code: "+91"},
        {name: "Canada", code: "+1"},
        {name: "Germany", code: "+49"},
        {name: "France", code: "+33"},
        {name: "Brazil", code: "+55"},
        {name: "South Africa", code: "+27"},
        {name: "China", code: "+86"},
        {name: "Japan", code: "+81"},
        {name: "Spain", code: "+34"},
        {name: "Italy", code: "+39"},
        {name: "Australia", code: "+61"},
        {name: "Ghana", code: "+233"},
        {name: "Kenya", code: "+254"}
    ];

    const countrySelect = document.getElementById("country");
    countries.forEach(c => {
        let option = document.createElement("option");
        option.value = c.code;
        option.textContent = `${c.name} (${c.code})`;
        countrySelect.appendChild(option);
    });
    countrySelect.addEventListener("change", function() {
        document.getElementById("phone").value = this.value;
    });

    // Registration submit
    document.getElementById("regForm").addEventListener("submit", function(e) {
        e.preventDefault();
        let registration = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            country: countrySelect.options[countrySelect.selectedIndex].text,
            phone: document.getElementById("phone").value,
            team: document.getElementById("team").value,
            game: document.getElementById("game").value,
            date: new Date().toLocaleString()
        };
        // Save to localStorage
        let registrations = JSON.parse(localStorage.getItem("registrations") || "[]");
        registrations.push(registration);
        localStorage.setItem("registrations", JSON.stringify(registrations));

        // WhatsApp redirect
        let message = `Tournament Registration:%0AName: ${registration.name}%0AEmail: ${registration.email}%0ACountry: ${registration.country}%0APhone: ${registration.phone}%0ATeam: ${registration.team}%0AGame: ${registration.game}`;
        window.location.href = `https://wa.me/2349079820557?text=${message}`;
    });

    // Admin functions
    function loadRegistrations() {
        let registrations = JSON.parse(localStorage.getItem("registrations") || "[]");
        let tbody = document.querySelector("#regTable tbody");
        tbody.innerHTML = "";
        registrations.forEach(r => {
            let tr = document.createElement("tr");
            tr.innerHTML = `<td>${r.name}</td><td>${r.email}</td><td>${r.country}</td><td>${r.phone}</td><td>${r.team}</td><td>${r.game}</td><td>${r.date}</td>`;
            tbody.appendChild(tr);
        });
    }

    window.clearData = function() {
        if(confirm("Are you sure you want to clear all registrations?")) {
            localStorage.removeItem("registrations");
            loadRegistrations();
        }
    }

});
</script>

</body>
</html>
